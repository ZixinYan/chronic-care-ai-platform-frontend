# AI 能力服务 - Provider
#
# ========== DeepSeek（OpenAI 兼容接口）==========
# 必须使用前缀 spring.ai.openai，不要使用顶层 ai.openai。
# 若写在 Nacos 的 yml 里也必须是 spring.ai.openai，否则不会绑定，请求会发到 OpenAI 官方，
# 模型名 deepseek-chat 在 OpenAI 侧不存在，即报「Model Not Exist」。
#
# 密钥：环境变量 DEEPSEEK_API_KEY（或 OPENAI_API_KEY）
# 模型：deepseek-chat（对话）或 deepseek-reasoner（推理），见 DeepSeek 开放平台文档
#
# 参考：https://docs.spring.io/spring-ai/reference/api/chat/deepseek-chat.html
spring:
  application:
    name: ai-capability-provider
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:${OPENAI_API_KEY:}}
      base-url: ${SPRING_AI_OPENAI_BASE_URL:https://api.deepseek.com}
      chat:
        model: ${DEEPSEEK_CHAT_MODEL:${OPENAI_CHAT_MODEL:deepseek-chat}}
        temperature: 0.7
        max-tokens: 2048

server:
  port: ${SERVER_PORT:8091}

# 技能根目录：其下每个技能为独立子目录，且内含固定文件名 SKILL.md（spring-ai-agent-utils SkillsTool 要求）
ai:
  capability:
    schedule-skills-dir: ${AI_CAPABILITY_SCHEDULE_SKILLS_DIR:}
    layout-skills-dir: ${AI_CAPABILITY_LAYOUT_SKILLS_DIR:}

logging:
  level:
    root: INFO
    com.zixin.aicapabilityprovider: INFO
    org.springaicommunity.agent.tools.SkillsTool: INFO
