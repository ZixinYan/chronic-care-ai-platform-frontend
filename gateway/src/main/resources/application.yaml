server:
  port: 8080

spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000
      lettuce:
        pool:
          max-active: 8
          max-wait: -1
          max-idle: 8
          min-idle: 0

  cloud:
    nacos:
      discovery:
        server-addr: 192.168.35.128:8848
        namespace: 48126882-0e93-4746-b265-ab232bf8d85e
        group: DEV_GROUP
    sentinel:
      enabled: true
      eager: true
      transport:
        dashboard: 192.168.35.128:8858
        port: 8719
      datasource:
        gw-flow:
          nacos:
            server-addr: 192.168.35.128:8848
            namespace: 48126882-0e93-4746-b265-ab232bf8d85e
            group-id: DEV_GROUP
            data-id: sentinel-gateway-flow.json
            rule-type: gw-flow
        degrade:
          nacos:
            server-addr: 192.168.35.128:8848
            namespace: 48126882-0e93-4746-b265-ab232bf8d85e
            group-id: DEV_GROUP
            data-id: sentinel-degrade.json
            rule-type: degrade

    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      forwarded:
        enabled: true

      routes:
        # 认证服务路由
        - id: auth-service
          uri: lb://auth-consumer
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=2

        # 账户服务路由（需要通过auth-consumer）
        - id: account-service
          uri: lb://auth-consumer
          predicates:
            - Path=/api/account/**
          filters:
            - StripPrefix=1

        # 健康报告服务路由
        - id: health-center-service
          uri: lb://health-center-consumer
          predicates:
            - Path=/api/health/**
          filters:
            - StripPrefix=2

        # 医生服务路由
        - id: doctor-service
          uri: lb://doctor-service-consumer
          predicates:
            - Path=/api/doctor/**
          filters:
            - StripPrefix=2

        # 消息系统路由
        - id: message-service
          uri: lb://message-system-consumer
          predicates:
            - Path=/api/message/**
          filters:
            - StripPrefix=2

# Dubbo配置
dubbo:
  application:
    name: api-gateway
  registry:
    address: nacos://localhost:8848
  protocol:
    name: dubbo
    port: -1
  consumer:
    check: false
    timeout: 30000

# 日志配置
logging:
  level:
    com.zixin.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
