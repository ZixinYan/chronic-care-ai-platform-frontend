server:
  port: 8083

spring:
  application:
    name: message-system-provider
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/chronic_care_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
  
  redis:
    host: localhost
    port: 6379
    database: 0
    password:
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms
    # Redis连接超时时间
    timeout: 3000ms

# 短信防刷配置
sms:
  rate-limit:
    # 是否启用防刷功能
    enabled: true
    # 短期限流配置（防止频繁发送）
    phone-short:
      limit: 1        # 60秒内同一手机号最多发送次数
      window: 60      # 时间窗口（秒）
    sender-short:
      limit: 5        # 60秒内同一发送者最多发送次数
      window: 60      # 时间窗口（秒）
    # 长期限流配置（防止恶意刷短信）
    phone-daily:
      limit: 10       # 24小时内同一手机号最多发送次数
      window: 86400   # 时间窗口（秒，24小时）


# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.zixin.messageapi.po
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Dubbo配置
dubbo:
  application:
    name: message-system-provider
  registry:
    address: nacos://localhost:8848
  protocol:
    name: dubbo
    port: 20883
  scan:
    base-packages: com.zixin.messageprovider.service

# 日志配置
logging:
  level:
    com.zixin.messageprovider: DEBUG
    com.zixin.messageprovider.mapper: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
