server:
  port: 8087

spring:
  application:
    name: health-center-consumer
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

# Dubbo配置
dubbo:
  application:
    name: health-center-consumer
  registry:
    address: nacos://localhost:8848
  consumer:
    check: false
    timeout: 30000

# 日志配置
logging:
  level:
    com.zixin.healthcenterconsumer: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
