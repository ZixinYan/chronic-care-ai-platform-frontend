server:
  port: 8082

spring:
  application:
    name: auth-provider
  
  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:
      timeout: 3000ms
      jedis:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0
  
  # 数据源配置（用于权限查询）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/chronic_care_account?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # Nacos服务发现
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

# JWT配置
jwt:
  # Access Token过期时间（秒）- 默认30分钟
  access-token:
    expiration: 1800
  # Refresh Token过期时间（秒）- 默认7天
  refresh-token:
    expiration: 604800
  # 权限缓存TTL（秒）- 默认30分钟
  permissions:
    cache-ttl: 1800
  # RSA密钥大小
  key-size: 2048

# Dubbo配置
dubbo:
  application:
    name: auth-provider
  registry:
    address: nacos://localhost:8848
  protocol:
    name: dubbo
    port: 20882
  scan:
    base-packages: com.zixin.authprovider.service
  provider:
    timeout: 30000

# MyBatis-Plus配置（如需使用）
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 日志配置
logging:
  level:
    com.zixin.authprovider: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
