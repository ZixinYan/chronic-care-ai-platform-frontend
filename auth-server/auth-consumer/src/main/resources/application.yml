server:
  port: 8081

spring:
  application:
    name: auth-consumer
  
  # Nacos服务发现
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

# Dubbo配置
dubbo:
  application:
    name: auth-consumer
  registry:
    address: nacos://localhost:8848
  consumer:
    check: false
    timeout: 30000

# 日志配置
logging:
  level:
    com.zixin.authconsumer: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
