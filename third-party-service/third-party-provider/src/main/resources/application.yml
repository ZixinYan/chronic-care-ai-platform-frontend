server:
  port: 8090

spring:
  application:
    name: third-party-provider
  
  # Nacos服务发现
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

# 阿里云OSS配置
oss:
  endpoint: ${OSS_ENDPOINT:https://oss-cn-hangzhou.aliyuncs.com}
  access-key-id: ${OSS_ACCESS_KEY_ID:your-access-key-id}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:your-access-key-secret}
  bucket-name: ${OSS_BUCKET_NAME:chronic-care-platform}
  # OSS文件上传配置
  upload:
    # 单个文件最大大小（字节）- 默认10MB
    max-file-size: 10485760
    # 分片上传阈值（字节）- 默认5MB，超过此大小使用分片上传
    multipart-threshold: 5242880
    # 分片大小（字节）- 默认1MB
    part-size: 1048576
    # 最大重试次数
    max-retry: 3

# 短信服务配置
sms:
  # 阿里云短信服务配置
  aliyun:
    access-key-id: ${SMS_ACCESS_KEY_ID:your-access-key-id}
    access-key-secret: ${SMS_ACCESS_KEY_SECRET:your-access-key-secret}
    # 短信签名
    sign-name: ${SMS_SIGN_NAME:慢病管理平台}
    # 短信模板配置
    templates:
      # 验证码模板
      verification-code: ${SMS_TEMPLATE_VERIFY:SMS_xxxxx}
      # 预警通知模板
      health-alert: ${SMS_TEMPLATE_ALERT:SMS_xxxxx}
      # 预约提醒模板
      appointment-reminder: ${SMS_TEMPLATE_APPOINTMENT:SMS_xxxxx}
  # 短信发送配置
  send:
    # 是否启用短信发送（开发环境可设置为false）
    enabled: ${SMS_ENABLED:true}
    # 每秒最大发送数量（限流）
    rate-limit: 10

# 邮件服务配置
email:
  # SMTP服务器配置
  host: ${EMAIL_HOST:smtp.163.com}
  port: ${EMAIL_PORT:465}
  username: ${EMAIL_USERNAME:your-email@163.com}
  password: ${EMAIL_PASSWORD:your-email-password}
  # 发件人信息
  from: ${EMAIL_FROM:your-email@163.com}
  from-name: ${EMAIL_FROM_NAME:慢病管理平台}
  # 邮件发送配置
  properties:
    mail:
      smtp:
        auth: true
        starttls:
          enable: true
          required: true
        ssl:
          enable: true
        timeout: 5000
        connection-timeout: 5000
  # 邮件模板配置
  templates:
    # 欢迎邮件模板路径
    welcome: classpath:/email-templates/welcome.html
    # 健康报告邮件模板路径
    health-report: classpath:/email-templates/health-report.html
    # 预警通知邮件模板路径
    alert: classpath:/email-templates/alert.html

# Dubbo配置
dubbo:
  application:
    name: third-party-provider
  registry:
    address: nacos://localhost:8848
  protocol:
    name: dubbo
    port: 20890
  scan:
    base-packages: com.zixin.thirdpartyprovider.service
  provider:
    timeout: 30000

# 日志配置
logging:
  level:
    com.zixin.thirdpartyprovider: DEBUG
    com.aliyun: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
